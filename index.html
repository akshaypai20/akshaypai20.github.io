<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enter Portfolio</title>

<style>
  :root {
    --bg: #0b1020;
    --fg: #e9e9f7;
    --muted: #a7a7c6;
    --primary: #7c5cff;
    --card: #141a2a;
  }

  body {
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--fg);
    font-family:system-ui,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .gate-box {
    background:var(--card);
    padding:32px;
    border-radius:12px;
    width:92%;
    max-width:380px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
    text-align:center;
  }
  input {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #334;
    background:#0a1130;
    color:var(--fg);
    font-size:1rem;
  }
  button {
    width:100%;
    padding:12px;
    margin-top:16px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:1rem;
  }
</style>
</head>

<body>

<div class="gate-box">
  <h2>Enter to View Portfolio</h2>
  <p style="color:var(--muted)">Provide your info to continue</p>

  <form id="gateForm">
    <input type="text" name="message" placeholder="Your name" required />
    <input type="email" name="email" placeholder="Your email" required />
    <button type="submit">Continue</button>
  </form>

  <p id="status" style="margin-top:15px;color:var(--muted);font-size:.9rem;"></p>
</div>

<!-- WORKING FORM SUBMISSION SCRIPT -->
<script>

async function isKickboxDisposable(email) {
  const domain = email.split("@")[1];
  const res = await fetch(`https://open.kickbox.com/v1/disposable/${domain}`);
  const json = await res.json();
  return json.disposable === true;
}

async function validateEmailAdvanced(email) {

  const apiKey = "2583d1d7790f7f8410ec1b6923cecd5d";
  const url = `https://apilayer.net/api/check?access_key=${apiKey}&email=${encodeURIComponent(email)}&smtp=1&format=1`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    // If API returned error
    if (data.error) { return { valid: false, reason: "Email verification service error." };  }
    // 1. Syntax check
    if (!data.format_valid) {return { valid: false, reason: "Email format is invalid." };}
    // 2. MX record check
    if (!data.mx_found) {      return { valid: false, reason: "Email domain has no MX records." }; }
    // 3. Disposable email provider?
    if (data.disposable) {return { valid: false, reason: "Disposable email addresses are not allowed." };
    }
    // SMTP check (deliverability)
    if (data.smtp_check === false) {return { valid: false, reason: "Email address cannot receive mail (SMTP check failed)." };}

    return { valid: true };

  } catch (err) {
    return { valid: false, reason: "Network or API error." };
  }
}

document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.textContent = "Validating email...";

  const data = new FormData(e.target);
  const email = data.get("email");
 
  if (await isKickboxDisposable(email)) {
    status.textContent = "Temporary email providers are not allowed.";
    return;
  }
  // --- ADVANCED EMAIL VALIDATION ---
  const result = await validateEmailAdvanced(email);
  if (!result.valid) {
    status.textContent = result.reason;
    return;
  }

  // ---- SEND TO FORMSPREE ----
  try {
    const res = await fetch("https://formspree.io/f/meerrazv", {
      method: "POST",
      body: data,
      headers: { "Accept": "application/json" }
    });

    if (res.ok) {
      status.textContent = "Success! Redirecting...";
      setTimeout(() => window.location.href = "https://akshaypai20.github.io/portfolio.html", 800);
    } else {
      status.textContent = "Form submission error.";
    }
  } catch (err) {
    status.textContent = "Network error. Try again.";
  }
});

</script>

</body>
</html>
