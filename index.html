
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Enter Portfolio</title>

  <style>
    :root {
      --bg: #0b1020;
      --fg: #e9e9f7;
      --muted: #a7a7c6;
      --primary: #7c5cff;
      --card: #141a2a;
    }

    body {
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--fg);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .gate-box {
      background:var(--card);
      padding:32px;
      border-radius:12px;
      width:100%;
      max-width:380px;
      box-shadow:0 8px 30px rgba(0,0,0,0.35);
      text-align:center;
    }

    h2 {margin-top:0;margin-bottom:12px;}
    p {margin-top:0;margin-bottom:20px;color:var(--muted);}

    input {
      width:100%;
      padding:12px;
      margin-bottom:16px;
      border-radius:6px;
      border:1px solid #334;
      background:#0a1130;
      color:var(--fg);
      font-size:1rem;
    }

    button {
      width:100%;
      padding:12px;
      background:var(--primary);
      color:white;
      border:none;
      border-radius:6px;
      font-size:1rem;
      cursor:pointer;
    }

    button:hover {
      opacity:0.9;
    }
  </style>
</head>

<script>
document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const data = new FormData(form);

  // Optional: store name/email for personalization
  localStorage.setItem("visitorName", data.get("message"));
  localStorage.setItem("visitorEmail", data.get("email"));

  const res = await fetch("https://formspree.io/f/meerrazv", {
    method: "POST",
    body: data,
    headers: { "Accept": "application/json" }
  });

  if (res.ok) {
    window.location.href = "portfolio.html";  // your real portfolio page
  } else {
    alert("There was an error submitting the form. Please try again.");
  }
});
</script>

<body>

  <div class="gate-box">
    <h2>Enter to View Portfolio</h2>
    <p>Please provide your name and email to continue.</p>

    <form id="gateForm" class="contact-form">
      <input type="email" name="email" placeholder="Your email" required />
      <input type="text" name="message" placeholder="Your name" required />
      <button type="submit">Continue</button>
    </form>

  </div>

</body>
</html>
