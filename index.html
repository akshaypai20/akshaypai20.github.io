<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enter Portfolio</title>

<style>
  :root {
    --bg: #0b1020;
    --fg: #e9e9f7;
    --muted: #a7a7c6;
    --primary: #7c5cff;
    --card: #141a2a;
  }

  body {
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--fg);
    font-family:system-ui,Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .gate-box {
    background:var(--card);
    padding:32px;
    border-radius:12px;
    width:92%;
    max-width:380px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
    text-align:center;
  }
  input {
    width:100%;
    padding:12px;
    margin-top:12px;
    border-radius:6px;
    border:1px solid #334;
    background:#0a1130;
    color:var(--fg);
    font-size:1rem;
  }
  button {
    width:100%;
    padding:12px;
    margin-top:16px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:1rem;
  }
</style>
</head>

<body>

<div class="gate-box">
  <h2>Enter to View Portfolio</h2>
  <p style="color:var(--muted)">Provide your info to continue</p>

  <form id="gateForm">
    <input type="text" name="message" placeholder="Your name" required />
    <input type="email" name="email" placeholder="Your email" required />
    <button type="submit">Continue</button>
  </form>

  <p id="status" style="margin-top:15px;color:var(--muted);font-size:.9rem;"></p>
</div>

<!-- WORKING FORM SUBMISSION SCRIPT -->
<script>
document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const status = document.getElementById("status");
  status.textContent = "Sending...";

  const data = new FormData(e.target);

  try {
    const res = await fetch("https://formspree.io/f/meerrazv", {
      method: "POST",
      body: data,
      headers: { "Accept": "application/json" }
    });

    if (res.ok) {
      status.textContent = "Success! Redirecting...";
      // Redirect after 800ms for smooth UX
      setTimeout(() => {
        window.location.href = "https://akshaypai20.github.io/portfolio.html";
      }, 800);
    } else {
      status.textContent = "Error sending message.";
    }
  } catch(err) {
    status.textContent = "Network error. Try again.";
  }
});
</script>

</body>
</html>
